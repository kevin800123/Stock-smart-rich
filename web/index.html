<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STOCKS POWER RICH</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>STOCKS POWER RICH <span class="zh">股力智富</span></h1>
    <div class="actions">
      <span id="last-updated" class="muted">尚未更新</span>
      <button id="btn-update">⟳ 一鍵更新</button>
    </div>
  </header>

  <div id="update-status" class="status-bar hidden"></div>

  <main>
    <section class="panel">
      <h2>大盤儀表板</h2>
      <div id="cards" class="cards"></div>
      <div class="chart-row">
        <div class="chart-side">
          <div class="chart-side-title">商品</div>
          <label><input type="radio" name="idx" value="taiex" checked /> 加權指數</label>
          <label><input type="radio" name="idx" value="tx" /> 台指期</label>
        </div>
        <div class="chart-main">
          <div class="chart-toolbar">
            <button class="tf active" data-iv="1d">日線</button>
            <button class="tf" data-iv="1wk">週線</button>
            <button class="tf" data-iv="1mo">月線</button>
            <span id="idx-note" class="muted"></span>
          </div>
          <div id="idxchart" class="chart"></div>
        </div>
      </div>
      <div id="market-summary" class="ai-box">點「一鍵更新」後可生成盤勢摘要。</div>
    </section>

    <section class="panel">
      <h2>籌碼 CSV 分析</h2>
      <div class="upload-row">
        <label class="file-label">
          <input type="file" id="csv" accept=".csv,.xlsx,.xlsm" hidden />
          📤 上傳今日檔（CSV/Excel）
        </label>
        <button id="btn-latest" class="file-label">📂 讀取資料夾最新檔</button>
        <label class="date-pick">資料日期 <select id="date-select"></select></label>
        <span id="upload-info" class="muted"></span>
      </div>

      <h3>產業榜</h3>
      <div id="industry" class="table-wrap"></div>

      <h3>當日訊號榜（大戶進＋散戶退）</h3>
      <div id="daily" class="table-wrap"></div>

      <h3>跨週變化（本週 vs 上週）<span id="weekly-dates" class="muted"></span></h3>
      <div id="weekly" class="table-wrap"></div>

      <div id="csv-summary" class="ai-box">上傳 CSV 後可生成籌碼洞察。</div>
    </section>
  </main>

  <div id="kline-modal" class="modal hidden">
    <div class="modal-body">
      <div class="modal-head">
        <span id="kline-title"></span>
        <div class="kline-tf">
          <button class="ktf active" data-iv="1d">日</button>
          <button class="ktf" data-iv="1wk">週</button>
          <button class="ktf" data-iv="1mo">月</button>
        </div>
        <button id="kline-close">✕</button>
      </div>
      <div id="kline-profile" class="kline-profile"></div>
      <div id="kline" class="kline-chart"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
